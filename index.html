
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>City Street Speed Limit Lookup (Local Roads)</title>

  <!-- Leaflet CSS (no SRI; jsDelivr) -->
  <link
    rel="stylesheet"
    href="1.9.4/dist/leaflet.css

  <style>
    /* Hardening layout to avoid zero-height map on some hosts */
    html, body { height: 100%; margin:0; }
    /* Either of the two lines below work well. The second is most bulletproof. */
    /* #map { height: 100vh; } */
    #map { position: absolute; inset: 0; }  /* Fill the viewport */

    .panel {
      position:absolute; top:10px; left:10px; z-index:1000; background:#fff;
      padding:12px 14px; border-radius:8px; box-shadow:0 2px 10px rgba(0,0,0,.2); width:350px;
      font: 13px system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .panel h2 { margin:0 0 8px; font-weight:600; font-size:16px; }
    .panel label { display:block; margin:6px 0 2px; font-size:12px; }
    .panel input[type="text"], .panel input[type="number"] {
      width:100%; padding:6px 8px; border:1px solid #bbb; border-radius:4px; font-size:14px;
    }
    .panel button {
      width:100%; margin-top:8px; padding:8px 10px; background:#16a34a; color:#fff;
      border:0; border-radius:4px; cursor:pointer; font-size:14px;
    }
    .panel button:hover { background:#15803d; }
    .status { font-size:12px; margin-top:6px; min-height:18px; }
    .results { max-height: 200px; overflow:auto; margin-top:6px; font-size:12px; border-top:1px solid #eee; padding-top:6px; }
    .result-item { padding:6px 0; border-bottom:1px dashed #eee; cursor:pointer; }
    .result-item:hover { background:#fafafa; }
    .small { font-size:11px; color:#444; margin-top:8px; }
    .chk { font-size:12px; margin-top:6px; display:flex; align-items:center; gap:8px; }
    .warn { color:#8a3a01; }
    .legend { margin-top:8px; border-top:1px solid #eee; padding-top:6px; font-size:11px; color:#333; }
    .swatch { display:inline-block; width:12px; height:12px; border-radius:2px; margin-right:6px; vertical-align:-2px; }
    .pill {
      display:inline-block; padding:2px 6px; font-size:11px; border-radius:999px; background:#eef2ff; color:#3730a3; margin-left:6px;
      border:1px solid #c7d2fe;
    }
  </style>
</head>
<body>
  <div id="map"></div>

</html>
