
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>City Street Speed Limit Lookup (Local Roads)</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
0px; left:10px; z-index:1000; background:#fff;
      padding:12px 14px; border-radius:8px; box-shadow:0 2px 10px rgba(0,0,0,.2); width:330px;
      font: 13px system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .panel h2 { margin:0 0 8px; font-weight:600; font-size:16px; }
    .panel label { display:block; margin:6px 0 2px; font-size:12px; }
    .panel input {
      width:100%; padding:6px 8px; border:1px solid #bbb; border-radius:4px; font-size:14px;
    }
    .panel button {
      width:100%; margin-top:8px; padding:8px 10px; background:#16a34a; color:#fff;
      border:0; border-radius:4px; cursor:pointer; font-size:14px;
    }
    .panel button:hover { background:#15803d; }
    .status { font-size:12px; margin-top:6px; min-height:18px; }
    .results { max-height: 180px; overflow:auto; margin-top:6px; font-size:12px; border-top:1px solid #eee; padding-top:6px; }
    .result-item { padding:4px 0; border-bottom:1px dashed #eee; }
    .small { font-size:11px; color:#444; margin-top:8px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <h2>City Street Speed Limit Lookup</h2>

    <label for="latlon">Coordinates (lat, lon)</label>
    <input id="latlon" placeholder="e.g., 47.201036763018415, -121.9889471027125" />

    <label for="rad">Search radius (meters)</label>
    <input id="rad" value="300" />

    <button id="go">Find nearest local-road speed</button>

    <div class="status" id="status"></div>
    <div class="results" id="results"></div>
    <div class="small">
      Click the map to drop a red dot and look up the nearest road with a mapped speed limit.<br/>
      Source: OpenStreetMap via Overpass API. Coverage depends on local mapping; results may be incomplete or outdated.
    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
 1297], 12); // default: San Francisco
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let pointMarker, nearestLine;

    // --- Overpass mirrors for resiliency ---
    const overpassEndpoints = [
      'https://overpass-api.de/api/interpreter',
      'https://overpass.kumi.systems/api/interpreter',
      'https://overpass.openstreetmap.ru/api/interpreter'
    ];

    // Build an Overpass query around a point, searching for roads with maxspeed
    function buildQuery(lat, lon, radius) {
      return `
        [out:json][timeout:25];
        way(around:${radius},${lat},${lon})["highway"]["maxspeed"];
        out geom tags;
      `;
    }

    // POST the query to Overpass (rotate through mirrors if one fails)
    async function fetchOverpass(queryText) {
      const body = 'data=' + encodeURIComponent(queryText);
      for (const ep of overpassEndpoints) {
        try {
          const r = await fetch(ep, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body
          });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return await r.json();
        } catch (e) {
          console.warn('Overpass endpoint failed, trying next:', ep, e);
        }
      }
      throw new Error('All Overpass endpoints failed. Try again later.');
    }

    // Haversine distance (meters) between two lat/lon points
    function haversine(lat1, lon1, lat2, lon2){
      const R=6371000; const toRad = d=>d*Math.PI/180;
      const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
      const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R*c;
    }

    // Approximate nearest distance from point to a polyline by sampling endpoints + midpoint
    function lineDistanceToPoint(coords, lat, lon){
      let best = Infinity;
      for (let i=0; i<coords.length-1; i++){
        const [lon1, lat1] = coords[i];
        const [lon2, lat2] = coords[i+1];
        const midLat=(lat1+lat2)/2, midLon=(lon1+lon2)/2;
        best = Math.min(
          best,
          haversine(lat,lon,lat1,lon1),
          haversine(lat,lon,lat2,lon2),
          haversine(lat,lon,midLat,midLon)
        );
      }
      return best;
    }

    function drawWay(way){
      const coords = way.geometry.map(n => [n.lat, n.lon]);
      const poly = L.polyline(coords, { color:'#e11d48', weight:4, opacity:0.9 });
      poly.addTo(map);
      return poly;
    }

    // Parse a single "lat, lon" input; accept commas or whitespace; allow parentheses
    function parseLatLon(input) {
      if (!input) return { ok:false, message: 'Please enter coordinates as "lat, lon".' };
      const cleaned = input.replace(/[()]/g, '').trim();
      let parts = cleaned.includes(',') ? cleaned.split(',') : cleaned.split(/\s+/);
      parts = parts.map(s => s.trim()).filter(Boolean);
      if (parts.length !== 2) {
        return { ok:false, message: 'Use format: latitude, longitude (e.g., 47.2010, -121.9889).' };
      }
      const lat = parseFloat(parts[0]);
      const lon = parseFloat(parts[1]);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
        return { ok:false, message: 'Latitude/longitude must be decimal numbers.' };
      }
      if (lat < -90 || lat > 90 || lon < -180 || lon > 180) {
        return { ok:false, message: 'Latitude must be between -90 and 90; longitude between -180 and 180.' };
      }
      return { ok:true, lat, lon };
    }

    // Parse maxspeed tag and return mph (number) + display text (rounded)
    function parseMaxspeedToMph(tags){
      const raw = (tags.maxspeed || '').toString().toLowerCase().trim();
      const advisory = (tags['maxspeed:advisory'] || '').toString().toLowerCase().trim();
      const candidate = raw || advisory;
      if (!candidate) return { mphText: 'N/A' };

      // Common non-numeric values in OSM
      const nonNumeric = ['signals','variable','none','walk','unposted','national','implicit'];
      if (nonNumeric.includes(candidate)) return { mphText: candidate.toUpperCase() };

      // Extract number and units if present
      const match = candidate.match(/([0-9]+(?:\\.[0-9]+)?)\\s*(mph|mi\\/h|km\\/h|kmh|kph)?/);
      if (!match) return { mphText: candidate };
      const value = parseFloat(match[1]);
      const unit = (match[2] || '').toLowerCase();

      let mph = value;
      if (unit === 'km/h' || unit === 'kmh' || unit === 'kph') {
        mph = value * 0.621371; // convert km/h to mph
      } else if (unit === 'mph' || unit === 'mi/h') {
        mph = value; // already mph
      } else {
        // Unit not specified: assume km/h (conservative)
        mph = value * 0.621371;
      }
      return { mph, mphText: Math.round(mph) + ' mph' };
    }

    function showMarker(lat, lon){
      if (pointMarker) map.removeLayer(pointMarker);
      pointMarker = L.circleMarker([lat, lon], {
        radius: 6, color: '#b91c1c', fillColor: '#ef4444', fillOpacity: 0.9, weight: 2
      }).addTo(map);
    }

    async function lookupAt(lat, lon, radius){
      const status = document.getElementById('status');
      const resultsEl = document.getElementById('results');
      resultsEl.innerHTML = '';

      status.textContent = 'Querying OpenStreetMap (local roads with maxspeed)…';

      if (nearestLine) { map.removeLayer(nearestLine); }
      showMarker(lat, lon);
      map.setView([lat, lon], 15);

      try {
        const data = await fetchOverpass(buildQuery(lat, lon, radius));
        const ways = (data.elements || []).filter(el => el.type === 'way');

        if (ways.length === 0){
          status.textContent = `No OSM roads with a mapped speed limit within ${radius} m.`;
          return;
        }

        // Compute nearest by simple distance to polyline vertices/midpoints
        const withDist = ways.map(w => {
          const coords = w.geometry.map(g => [g.lon, g.lat]);
          const d = lineDistanceToPoint(coords, lat, lon);
          return { way:w, dist:d };
        }).sort((a,b) => a.dist - b.dist);

        const nearest = withDist[0];
        const w = nearest.way;
        const speed = parseMaxspeedToMph(w.tags);
        const roadName = w.tags.name || '(unnamed road)';

        if (nearestLine) map.removeLayer(nearestLine);
        nearestLine = drawWay(w);

        status.innerHTML = `Nearest local road: <b>${roadName}</b> · <b>${speed.mphText}</b> · ${nearest.dist.toFixed(0)} m away`;

        const top = withDist.slice(0,5);
        resultsEl.innerHTML = top.map(({way, dist}) => {
          const s = parseMaxspeedToMph(way.tags).mphText;
          const n = way.tags.name || '(unnamed road)';
          return `<div class='result-item'><b>${n}</b><br/>Speed limit: <b>${s}</b><br/><span style='color:#555'>${dist.toFixed(0)} m away</span></div>`;
        }).join('');
      } catch (e) {
        console.error(e);
        status.textContent = 'Overpass query failed: ' + e.message;
      }
    }

    function runFromTextbox(){
      const coordInput = document.getElementById('latlon').value;
      const radius = parseFloat(document.getElementById('rad').value) || 300;
      const parsed = parseLatLon(coordInput);
      if (!parsed.ok) {
        document.getElementById('status').textContent = parsed.message;
        return;
      }
      const { lat, lon } = parsed;
      lookupAt(lat, lon, radius);
    }

    document.getElementById('go').addEventListener('click', runFromTextbox);
    ['latlon','rad'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') runFromTextbox(); });
    });

    // --- Map click: drop a red dot and look up ---
    map.on('click', (e) => {
      const radius = parseFloat(document.getElementById('rad').value) || 300;
      const lat = e.latlng.lat;
      const lon = e.latlng.lng;
      document.getElementById('latlon').value = lat.toFixed(6) + ', ' + lon.toFixed(6);
      lookupAt(lat, lon, radius);
    });
  </script>
</body>
</html>
``
